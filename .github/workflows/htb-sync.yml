name: HTB Activity Sync

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# Explicitly grant permissions to push the JSON file to your repo
permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # Updated to fix Node.js warning

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated to fix Node.js warning
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch HTB Data
        env:
          HTB_API_TOKEN: ${{ secrets.HTB_API_TOKEN }}
        run: python fetch_htb.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # Only attempt to add the file if it was successfully created
          if [ -f htb_activity.json ]; then
            git add htb_activity.json
            git commit -m "Auto-update HTB activity [skip ci]" || echo "No changes to commit"
            git push
          else
            echo "htb_activity.json was not created. Check python script output."
          fi
