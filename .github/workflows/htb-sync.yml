name: HTB Activity Sync

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight UTC
  workflow_dispatch: # Allows you to run it manually by clicking a button

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch HTB Data
        env:
          HTB_API_TOKEN: ${{ secrets.HTB_API_TOKEN }}
        run: python fetch_htb.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add htb_activity.json
          git commit -m "Auto-update HTB activity [skip ci]" || echo "No changes to commit"
          git push
